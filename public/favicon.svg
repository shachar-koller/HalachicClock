<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Halachic Clock favicon</title>
  <desc id="desc">A clock face with Hebrew letters at the top, right, bottom, and left positions.</desc>
  <defs>
    <radialGradient id="face" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#faf6ee" />
      <stop offset="100%" stop-color="#e4cf9f" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#6d5522" flood-opacity="0.22" />
    </filter>
  </defs>

  <circle cx="32" cy="32" r="30" fill="#f4ead5" />
  <circle cx="32" cy="32" r="27.5" fill="url(#face)" stroke="#8b6a2c" stroke-width="2.5" filter="url(#shadow)" />
  <circle cx="32" cy="32" r="22.5" fill="none" stroke="#b79a5c" stroke-width="1" opacity="0.75" />

  <g stroke="#7b6226" stroke-linecap="round" opacity="0.7">
    <path d="M32 9.5v3.5" stroke-width="2" />
    <path d="M54.5 32H51" stroke-width="2" />
    <path d="M32 54.5V51" stroke-width="2" />
    <path d="M9.5 32H13" stroke-width="2" />
  </g>

  <g
    fill="#523a12"
    font-size="9.5"
    font-weight="700"
    text-anchor="middle"
    dominant-baseline="middle"
    style="font-family: 'Times New Roman', 'Noto Serif Hebrew', serif;"
  >
    <text x="32" y="14.5">א</text>
    <text x="49.5" y="32">ג</text>
    <text x="32" y="49.5">ו</text>
    <text x="14.5" y="32">ט</text>
  </g>

  <g stroke="#c28b18" stroke-linecap="round">
    <path d="M32 32L32 20" stroke-width="3.2" />
    <path d="M32 32L42.5 26.5" stroke-width="2.8" />
  </g>

  <circle cx="32" cy="32" r="3.2" fill="#8b6914" />
  <circle cx="32" cy="32" r="1.2" fill="#faf6ee" />
</svg>
